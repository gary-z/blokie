<head>
    <title>Watch an AI Play Blockudoku/Woodoku/Block Sudoku</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        @keyframes cell-fade-in {
            from { opacity: 0.45; }
        }
        @keyframes cell-shrink-out {
            to { transform: scale(0); }
        }
        td.has-piece,
        td.drag-shadow {
            animation: cell-fade-in 0.2s ease-out;
        }
        #game-board tr:nth-of-type(n):nth-of-type(n) td.shrinking-piece:nth-of-type(n):nth-of-type(n) {
            background: rgb(54, 112, 232);
            border: 1px solid black;
            animation: cell-shrink-out 0.2s ease-in forwards;
        }
        body {
            padding: none;
            border: none;
        }

        #page-description {
            text-align: center;
        }

        #score {
            text-align: center;
            font-family: roboto;
            font-size: 5vh;
            font-weight: bold;
            margin-bottom: 3vh;
        }

        #for-aspect-ratio {
            aspect-ratio: 2/3;
            width: min(90vw, calc(90vh / (3/2)));
            margin: auto;
        }

        #game-table-container {
            aspect-ratio: 1 / 1;
        }

        #game-board {
            border-collapse: collapse;
            background: white;
            outline: 2px solid rgb(180, 185, 190);
            margin: auto;
            width: 100%;
            height: 100%;
        }

        #game-board tr td {
            width: 10%;
            height: 10%;
            border: 0.5px solid rgb(180, 185, 190);
        }

        #game-board tr:nth-of-type(-n+3) td:nth-child(n+4):nth-child(-n+6),
        #game-board tr:nth-child(n+4):nth-child(-n+6) td:nth-child(-n+3),
        #game-board tr:nth-child(n+4):nth-child(-n+6) td:nth-child(n+7):nth-child(-n+9),
        #game-board tr:nth-child(n+7):nth-child(-n+9) td:nth-child(n+4):nth-child(-n+6) {
            background: rgb(228, 233, 238)
        }

        #game-board tr:nth-of-type(n):nth-of-type(n) td.has-piece:nth-of-type(n):nth-of-type(n) {
            background: rgb(54, 112, 232);
            border: 1px solid black;
        }

        #game-board tr:nth-of-type(n):nth-of-type(n) td.drag-shadow:nth-of-type(n):nth-of-type(n) {
            background: rgba(128, 128, 128, 0.45);
        }

        @media(hover: hover) and (pointer: fine) {
            #game-board td:hover {
                outline: 4px solid orangered;
            }

            table.pieces-on-deck tr td:hover {
                outline: 4px solid orangered;
            }
        }

        #pieces-on-deck-container {
            display: flex;
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
            aspect-ratio: 3 / 1;
            width: 100%;
        }

        table.pieces-on-deck {
            border-collapse: collapse;
            border-spacing: 0;
            margin: 3px;
        }

        table.pieces-on-deck td,
        table.pieces-on-deck th {
            padding: 0;
        }

        table.pieces-on-deck {
            width: 33%
        }

        table.pieces-on-deck tr td {
            width: 20%;
            height: 20%;
        }

        table.pieces-on-deck tr td.has-piece {
            background: rgb(54, 112, 232);
            border: 1px solid black;
        }

        .footer {
            text-align: center;
            font-size: 2vh;
        }

        #speed-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        .speed-btn {
            background: #e0e0e0;
            border: 1px solid #ccc;
            color: #222;
            padding: 1vh 2vw;
            cursor: pointer;
            font-size: 3vh;
            font-weight: bold;
            transition: background 0.15s, color 0.15s;
        }

        .speed-btn:first-child {
            border-radius: 6px 0 0 6px;
        }

        .speed-btn:last-child {
            border-radius: 0 6px 6px 0;
        }

        .speed-btn + .speed-btn {
            border-left: none;
        }

        .speed-btn.active {
            background: rgb(54, 112, 232);
            color: white;
            border-color: rgb(54, 112, 232);
        }

        .speed-btn.active + .speed-btn {
            border-left-color: rgb(54, 112, 232);
        }
    </style>
